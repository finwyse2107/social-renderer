version: "3.9"

services:
  social-renderer:
    build: .
    container_name: social-renderer
    restart: unless-stopped
    environment:
      PORT: 4000
      SHARED_SECRET: ${SHARED_SECRET}
    # Resource caps so headless Chromium never starves Postiz / n8n on the shared host.
    mem_limit: 1g
    memswap_limit: 1g
    shm_size: "256m"
    # No `ports:` — internal-only. n8n reaches this container as http://social-renderer:4000
    networks:
      - n8n-network

networks:
  n8n-network:
    external: true
    name: n8n-n8nrunnerpostgresollama-exwyyz
